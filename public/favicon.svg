<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#f43f5e" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- Handles -->
  <path d="M 176 170 C 176 60, 336 60, 336 170" fill="none" stroke="#1e293b" stroke-width="40" stroke-linecap="round" />
  <!-- Bag Body -->
  <rect x="80" y="160" width="352" height="320" rx="48" fill="url(#bag-grad)" filter="url(#shadow)" />
  <!-- Percent Sign -->
  <text x="256" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="900" font-size="160" text-anchor="middle">%</text>
</svg>
